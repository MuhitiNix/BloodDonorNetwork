<!DOCTYPE html>
<html>
<head>
    <title>Donor Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

<div class="container bg-white p-4 rounded shadow" style="max-width: 650px;">
    <h2 class="text-danger mb-4 text-center">Register as a Blood Donor</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Full Name <span class="text-danger">*</span></label>
                <input type="text" name="full_name" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Phone Number <span class="text-danger">*</span></label>
                <input type="tel" name="phone_number" class="form-control" placeholder="01XXXXXXXXX" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Date of Birth <span class="text-danger">*</span></label>
                <input type="date" name="dob" class="form-control" required>
                <small class="text-muted">You must be 18+</small>
            </div>
            <div class="col-md-6 mb-3">
                <label>Gender <span class="text-danger">*</span></label>
                <select name="gender" class="form-control" required>
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Blood Group <span class="text-danger">*</span></label>
                <select name="blood_group" class="form-control" required>
                    <option value="">Select...</option>
                    <option value="A+">A+</option>
                    <option value="O+">O+</option>
                    <option value="B+">B+</option>
                    <option value="AB+">AB+</option>
                    <option value="A-">A-</option>
                    <option value="O-">O-</option>
                    <option value="B-">B-</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Occupation</label>
                <input type="text" name="occupation" class="form-control" placeholder="">
            </div>
        </div>

        <div class="mb-4">
            <label>Date of Last Blood Donation</label>
            <input type="date" name="last_donation_date" class="form-control">
            <small class="text-muted">Leave blank if you have never donated before.</small>
        </div>

        <hr>

        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">

        <button type="button" class="btn btn-outline-danger w-100 mb-3" onclick="getLocation()">
            📍 Pin My Current Location (Required)
        </button>

        <p id="location-status" class="text-success text-center fw-bold" style="display:none;"></p>

        <button type="submit" class="btn btn-danger w-100" id="submit-btn" disabled>Submit Registration</button>
    </form>
</div>

<script>
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }

    function showPosition(position) {
        document.getElementById("latitude").value = position.coords.latitude;
        document.getElementById("longitude").value = position.coords.longitude;
        
        let statusText = document.getElementById("location-status");
        statusText.style.display = "block";
        statusText.innerHTML = "✅ Location securely captured!";
        
        // This unlocks the submit button!
        document.getElementById("submit-btn").disabled = false;
    }

    function showError(error) {
        alert("We need your location to match you with nearby hospitals! Please allow location access in your browser pop-up.");
    }
</script>

</body>
</html>
