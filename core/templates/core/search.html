<!DOCTYPE html>
<html>
<head>
    <title>Find Blood Donors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 550px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-danger mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/search/">🩸 Blood Donor Network</a>
        <div class="d-flex">
            <a href="/search/" class="btn btn-danger border-white me-2">Find Donors</a>
            <a href="/register/" class="btn btn-light text-danger fw-bold">Register as Donor</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-4 border-0">
                <h5 class="text-danger mb-3 fw-bold">Filter & Search</h5>
                
                <form method="GET" action="/search/">
                    <label class="fw-bold mb-1 text-muted">Blood Group</label>
                    <select name="blood_group" class="form-control mb-3">
                        <option value="">All Blood Groups</option>
                        <option value="A+">A+</option>
                        <option value="O+">O+</option>
                        <option value="B+">B+</option>
                        <option value="AB+">AB+</option>
                        <option value="A-">A-</option>
                        <option value="O-">O-</option>
                        <option value="B-">B-</option>
                        <option value="AB-">AB-</option>
                    </select>

                    <label class="fw-bold mb-1 text-muted">Search Radius (km)</label>
                    <input type="number" name="radius" class="form-control mb-3" value="5">
                    
                    <input type="hidden" id="search_lat" name="lat">
                    <input type="hidden" id="search_lng" name="lng">

                    <button type="button" class="btn btn-outline-secondary w-100 mb-2" onclick="getSearchLocation()">
                        📍 1. Pin My Location First
                    </button>

                    <button type="submit" class="btn btn-danger w-100 fw-bold">2. Search Database</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm p-2 border-0">
                <div id="map" class="border"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    
    var map = L.map('map').setView([23.8103, 90.4125], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    var userLatLng = null;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('lat') && urlParams.get('lng')) {
        userLatLng = L.latLng(urlParams.get('lat'), urlParams.get('lng'));
        var myIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
        L.marker(userLatLng, {icon: myIcon}).addTo(map).bindPopup("<b>You are here!</b>").openPopup();
        map.setView(userLatLng, 13); 
    }

    {% for donor in donors %}
        {% if donor.location %}
            var marker = L.marker([{{ donor.location.y }}, {{ donor.location.x }}]).addTo(map);
            var popupHTML = `
                <div class='text-center'>
                    <h6 class='text-danger fw-bold mb-1'>Blood Group: {{ donor.blood_group }}</h6>
                    <p class='mb-2'>Phone: {{ donor.phone_number }}<br>Gender: {{ donor.gender }}</p>
                    <button class='btn btn-sm btn-success w-100' onclick='openGoogleMaps({{ donor.location.y }}, {{ donor.location.x }})'>
                        🗺️ Open in Google Maps
                    </button>
                </div>
            `;
            marker.bindPopup(popupHTML);
        {% endif %}
    {% endfor %}

    function openGoogleMaps(destLat, destLng) {
        if (!userLatLng) {
            alert("We don't know where you are! Please click '1. Pin My Location First' so Google Maps knows where to start the route.");
            return;
        }

        var origin = userLatLng.lat + "," + userLatLng.lng;
        var destination = destLat + "," + destLng;
        var googleMapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;

        window.open(googleMapsUrl, '_blank');
    }
    function getSearchLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                document.getElementById("search_lat").value = position.coords.latitude;
                document.getElementById("search_lng").value = position.coords.longitude;
                alert("✅ Location captured! Now click '2. Search Database' to update the map.");
            });
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }
</script>

</body>
</html>
